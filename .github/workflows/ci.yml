name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  full-suite:
    name: Full suite
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://parkquest:parkquest@localhost:5432/parkquest_test
      NODE_ENV: test
      BETTER_AUTH_SECRET: test-secret-not-production
      BETTER_AUTH_URL: http://localhost:3000
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: parkquest_test
          POSTGRES_USER: parkquest
          POSTGRES_PASSWORD: parkquest
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U parkquest -d parkquest_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run database migrations
        run: npm run db:migrate

      - name: Seed test database
        run: ALLOW_PRODUCTION_SEED=1 npm run db:seed

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Test coverage
        run: npm run test:coverage
